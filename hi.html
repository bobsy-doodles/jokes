    <!-- Notification Container -->
    <div id="notification-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <script>
        function showNotification(message, type = 'success') {
            const notificationContainer = document.getElementById('notification-container');
            
            const notification = document.createElement('div');
            notification.className = `notification p-4 rounded-lg shadow-lg flex items-center ${type === 'success' ? 'bg-blue-500' : 'bg-red-500'} text-white max-w-sm`;
            
            const icon = document.createElement('div');
            icon.className = 'mr-3';
            icon.innerHTML = type === 'success' 
                ? '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d[...]
                : '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d[...]
            
            const text = document.createElement('div');
            text.textContent = message;
            
            notification.appendChild(icon);
            notification.appendChild(text);
            notificationContainer.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.add('hide');
                setTimeout(() => {
                    notificationContainer.removeChild(notification);
                }, 500);
            }, 3000);
        }

        const contactForm = document.getElementById('contact-form');
        contactForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const subjectCategory = document.getElementById('subject-category').value;
            const message = document.getElementById('message').value.trim();
            
            if (name && email && subject && message) {
                // Prepare form data for external service
                const formData = new FormData();
                formData.append('name', name);
                formData.append('email', email);
                formData.append('subject', subject);
                formData.append('subject-category', subjectCategory);
                formData.append('message', message);
                
                // Send to external form service
                fetch('https://www.response-o-matic.com/mail.php', {
                    method: 'POST',
                    body: formData
                }).catch(err => {
                    console.log('Form submitted');
                });
                
                contactForm.reset();
                showNotification('Thank you! Your message has been sent successfully.', 'success');
                
                // Scroll to top
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showNotification('Please fill in all required fields.', 'error');
            }
        });

        // FAQ details styling
        document.querySelectorAll('details').forEach(detail => {
            detail.addEventListener('toggle', () => {
                if (detail.open) {
                    detail.style.background = '#EFF6FF';
                } else {
                    detail.style.background = 'white';
                }
            });
        });
